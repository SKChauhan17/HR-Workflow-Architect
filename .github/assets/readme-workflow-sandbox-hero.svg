<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 430" role="img" aria-labelledby="title desc">
  <title id="title">Workflow Sandbox</title>
  <desc id="desc">Editorial hero banner for the workflow sandbox module.</desc>
