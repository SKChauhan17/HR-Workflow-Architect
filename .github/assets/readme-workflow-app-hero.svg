<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 430" role="img" aria-labelledby="title desc">
  <title id="title">Workflow App Shell</title>
  <desc id="desc">Editorial hero banner for the Next.js app shell and route layer.</desc>
  <defs>
