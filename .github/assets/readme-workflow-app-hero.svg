  <text x="112" y="238" fill="#181d26" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="700" letter-spacing="-0.04em">Workflow App Shell</text>
  <text x="112" y="286" fill="#4b5563" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="500" letter-spacing="0.01em">Layout, theme, and route handlers that stitch the workflow experience together.</text>
