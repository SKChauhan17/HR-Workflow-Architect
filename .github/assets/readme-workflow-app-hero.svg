    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1b61c9" flood-opacity="0.08" />
    </filter>
  </defs>
  <rect width="1600" height="430" fill="url(#bg)" />
  <g filter="url(#cardShadow)">
